name: Deploy Gate

on:
  pull_request:
    branches: [main]

jobs:
  permission-check:
    name: Permission Protocol
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for protected paths
        id: check
        run: |
          PROTECTED_REGEX='^(deploy/|\.github/workflows/|app/api/|middleware\.ts)'
          
          CHANGED=$(gh pr view ${{ github.event.pull_request.number }} \
            --json files --jq '.files[].path')
          
          echo "📁 Changed files:"
          echo "$CHANGED"
          echo ""
          
          HITS=$(echo "$CHANGED" | grep -E "$PROTECTED_REGEX" || true)
          if [ -n "$HITS" ]; then
            echo "🔒 Protected files changed:"
            echo "$HITS"
            echo "protected=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ No protected files"
            echo "protected=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify PP Receipt
        if: steps.check.outputs.protected == 'true'
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "  🔐 PERMISSION PROTOCOL - Deploy Authorization Required"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          
          REPO="${{ github.repository }}"
          REPO="${REPO,,}"
          SHA="${{ github.event.pull_request.head.sha }}"
          PR="${{ github.event.pull_request.number }}"
          
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.PP_BASE_URL }}/api/v1/receipts/verify" \
            -H "X-PP-API-Key: ${{ secrets.PP_API_KEY }}" \
            -H "X-PP-Request-Create-Token: ${{ secrets.PP_REQUEST_CREATE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"scope\": {
                \"repo\": \"${REPO}\",
                \"prNumber\": ${PR},
                \"headSha\": \"${SHA}\",
                \"env\": \"production\",
                \"capability\": \"deploy:production\"
              },
              \"redeem\": false,
              \"failOnMissing\": true
            }")
          
          echo "🔍 API response:"
          echo "$RESPONSE" | jq '.' 2>/dev/null || echo "$RESPONSE"
          echo ""
          
          VALID=$(echo "$RESPONSE" | jq -r '.result.valid // .valid // false')
          REQUEST_ID=$(echo "$RESPONSE" | jq -r '.requestId // empty')
          APPROVAL_URL=$(echo "$RESPONSE" | jq -r '.approvalUrl // empty')
          
          if [ "$VALID" = "true" ]; then
            echo "✅ APPROVED - Receipt verified"
            echo ""
            echo "This deployment has been authorized."
            echo "Merge allowed."
          else
            echo "❌ NO RECEIPT - Approval required"
            echo ""
            echo "This PR changes protected deployment files."
            echo "A human must approve before merge."
            echo ""
            if [ -n "$APPROVAL_URL" ]; then
              echo "👉 APPROVE HERE: $APPROVAL_URL"
            else
              echo "👉 Go to: ${{ secrets.PP_BASE_URL }}/pp/deploy-requests"
            fi
            echo ""
            echo "After approval, re-run this workflow."
            echo "═══════════════════════════════════════════════════════════"
            exit 1
          fi

      - name: Skip (No protected paths)
        if: steps.check.outputs.protected != 'true'
        run: echo "✅ No protected paths changed - merge allowed"
